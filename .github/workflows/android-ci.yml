name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android 16 SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test, lint, and build debug APK
        run: ./gradlew test lint assembleDebug --stacktrace

      - name: Verify Room schema is committed
        run: git diff --exit-code -- app/schemas

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: RunTrip-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Room schema
        uses: actions/upload-artifact@v7
        with:
          name: room-schema-${{ github.sha }}
          path: app/schemas
          if-no-files-found: error
          retention-days: 14
